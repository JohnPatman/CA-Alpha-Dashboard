name: Daily Event Date Refresh

on:
  schedule:
    # Runs daily at 06:00 UTC (keeps relative-time data within ~1 day of today)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab

permissions:
  contents: write   # required to commit and push the updated DB

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run date rebase
        run: python3 rebase_dates.py

      - name: Commit and push updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.db
          if git diff --staged --quiet; then
            echo "No changes to commit — DB already current"
          else
            git commit -m "chore: daily event date rebase [skip ci]"
            git push
          fi
